<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synced Streaming</title>
</head>

<body>
    <h1>HLS Player</h1>

    <div class="row">
        <input
            id="src"
            type="url"
            placeholder="http://localhost:8001/master.m3u8"
            autocomplete="off"
        />
        <button id="load">Load</button>
    </div>

    <video id="video" controls playsinline></video>

    <div class="presence">
        <span id="viewers-badge" class="viewers-badge">0 viewers</span>
        <span id="viewers-list" class="viewers-list"></span>
    </div>

    <div class="name-row">
        <label for="name-input">Nickname:</label>
        <input id="name-input" type="text" placeholder="anonymous" maxlength="32" />
        <button id="name-btn">Set</button>
        <span id="name-status" class="name-status"></span>
    </div>

    <div class="chat">
        <div id="chat-log" class="chat-log"></div>
        <div class="row">
            <input id="chat-input" type="text" placeholder="Say something…" maxlength="500" />
            <button id="chat-send">Send</button>
        </div>
    </div>

    <p class="small">
        Safari (macOS/iOS) plays HLS natively. Other browsers use hls.js.
    </p>

    <details>
        <summary>Debug</summary>
        <pre id="log"></pre>
    </details>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
